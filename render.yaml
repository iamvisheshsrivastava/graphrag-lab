services:
  - type: web
    name: graphrag-lab-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false   # set this manually in the Render dashboard
    autoDeploy: true
